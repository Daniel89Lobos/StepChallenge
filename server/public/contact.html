<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Lobos Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">Lobos Shop</a>
      <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">Menu</button>
      <nav id="siteNav" class="site-nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a class="active" href="contact.html">Contact</a>
        <a href="account.html" data-account-link>Login</a>
        <a href="cart.html" class="cart-link">Cart <span class="cart-count" data-cart-count hidden>0</span></a>
      </nav>
    </header>

    <main>
      <section class="contact-card">
        <h1>Contact</h1>
        <p>
          Tell us what you are looking for. We can help with product questions,
          school orders, or family gifting.
        </p>
        <form id="contactForm" class="contact-form">
          <label for="name">Name</label>
          <input id="name" type="text" required />

          <label for="email">Email</label>
          <input id="email" type="email" required />

          <label for="message">Message</label>
          <textarea id="message" required></textarea>

          <button class="btn" type="submit">Send message</button>
        </form>
        <p id="contactNotice" class="notice"></p>
      </section>
    </main>

    <footer class="site-footer">
      <p>Lobos Shop</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
